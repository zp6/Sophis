# systemd-resolved drop-in: disable the stub listener so the DNS seeder
# can bind UDP/53 on 0.0.0.0. resolved keeps doing local DNS resolution
# for system processes via /run/systemd/resolve/resolv.conf (which is
# why we symlink /etc/resolv.conf to it).
#
# Install path: /etc/systemd/resolved.conf.d/no-stub-listener.conf
# Then: systemctl restart systemd-resolved && ln -sf /run/systemd/resolve/resolv.conf /etc/resolv.conf

[Resolve]
DNSStubListener=no
