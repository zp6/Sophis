# /etc/nginx/sites-available/faucet.sophis.org
#
# Sophis testnet faucet — reverse proxy with TLS, rate limiting, and security headers.
#
# Install:
#   sudo cp deploy/nginx-faucet.sophis.org.conf /etc/nginx/sites-available/faucet.sophis.org
#   sudo ln -sf /etc/nginx/sites-available/faucet.sophis.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS via certbot:
#   sudo certbot --nginx -d faucet.sophis.org --non-interactive --agree-tos -m ops@sophis.org

# Rate limit zones (define once at http{} level — already in nginx.conf if you use this snippet):
#   limit_req_zone $binary_remote_addr zone=faucet_drip:10m rate=6r/m;
#   limit_req_zone $binary_remote_addr zone=faucet_browse:10m rate=60r/m;
#
# If not, paste the two lines above into /etc/nginx/conf.d/00-rate-limits.conf

server {
    listen 80;
    listen [::]:80;
    server_name faucet.sophis.org;

    # ACME challenge — keep on 80 even after TLS is up
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name faucet.sophis.org;

    # certbot will fill these in; placeholders shown for reference
    ssl_certificate     /etc/letsencrypt/live/faucet.sophis.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faucet.sophis.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP keeps inline scripts (the faucet HTML uses one) but blocks third-party
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Body size — drip requests are tiny JSON
    client_max_body_size 4k;

    # Logs (keep separate from default access log for abuse analysis)
    access_log /var/log/nginx/faucet.access.log;
    error_log  /var/log/nginx/faucet.error.log warn;

    # Drip endpoint — strict rate limit
    location = /drip {
        limit_req zone=faucet_drip burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    # Status / index — looser rate limit
    location / {
        limit_req zone=faucet_browse burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }
}
