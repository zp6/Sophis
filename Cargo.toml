    "math",
    "crypto/hashes",
    "crypto/muhash",
    "crypto/addresses",
    "crypto/merkle",
    "notify",
    "indexes/core",
    "indexes/processor",
    "indexes/utxoindex",
    "rpc/macros",
    "rpc/core",
    "rpc/service",
    "rpc/grpc/core",
    "rpc/grpc/client",
    "rpc/grpc/server",
    "rpc/grpc/examples/simple_client",
    "rpc/wrpc/server",
    "rpc/wrpc/client",
    "rpc/wrpc/proxy",
    "rpc/wrpc/wasm",
    "rpc/wrpc/examples/subscriber",
    "rpc/wrpc/examples/simple_client",
    "rpc/wrpc/examples/vcc_v2",
    "mining",
    "mining/errors",
    "protocol/p2p",
    "protocol/flows",
    "components/addressmanager",
    "components/connectionmanager",
    "components/consensusmanager",
    "bridge",
    "database",
    "crypto/txscript",
    "crypto/txscript/errors",
    "testing/integration",
    "utils",
    "utils/tower",
    "rothschild",
    "miner",
    "dilithium-wallet",
    "testnet-faucet",
    "sophis-explorer",
    "metrics/core",
    "metrics/perf_monitor",
    "utils/alloc",
    "svm/core",
    "svm/runtime",
    "svm/host",
    "svm/sdk-macros",
    "svm/sdk",
    "svm/kani-proofs",
    "sophis-dnsseeder",
    "examples/contracts/token-minting-policy",
    "examples/contracts/transfer-policy",
    "examples/contracts/time-lock",
    # Phase 3 — ZK-Rollup (STARKs + Risc0 + native L1 sequencer)
    "rollup/core",
    "rollup/host",
    "rollup/verifier",
    "rollup/sequencer",
    "rollup/node",
    "rollup/bridge/deposit",
    "rollup/bridge/withdrawal",
    # rollup/guest is NOT here — separate workspace compiled by risc0-build
    # Phase 4 — ZK-Bridge cross-chain (Sophis ↔ Ethereum) was extracted to a
    # standalone repository on 2026-05-04. Cross-chain interoperability is
    # intentionally out-of-scope for the Sophis core team. See the project
    # memory `project_zkbridge_extraido.md` for context.
    # Phase 5 — ZK-Oracle Aggregator (Pyth singleton + Plonky3 + Dilithium relayer)
    "oracle/core",
    "oracle/feeds",
    "oracle/host",
    "oracle/verifier",
    "oracle/relayer",
    "oracle/contract",
    "oracle/sdk",
    "tools/sophis-da-stress",
    "tools/sophis-dashboard",
    "tools/sophis-calculator",
]

[workspace.package]
rust-version = "1.88.0"
version = "1.1.0"
authors = ["Sophis developers"]
license = "ISC"
repository = "https://github.com/sophisnet/rusty-sophis"
edition = "2024"
include = [
    "src/**/*.rs",
    "src/**/*.s",
    "src/**/*.r",
    "proto/**/*.proto",
    "benches/**/*.rs",
    "build.rs",
    "Cargo.toml",
    "Cargo.lock",
]

